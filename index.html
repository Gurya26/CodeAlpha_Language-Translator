<!DOCTYPE html>
<html>
<head>
    <title>AI Language Translator 🌍</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 25px;
            width: 420px;
            box-shadow: 0px 20px 40px rgba(0,0,0,0.25);
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 90px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            font-size: 14px;
        }

        select, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
        }

        button {
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
        }

        .output {
            background: #f4f4f4;
            padding: 12px;
            border-radius: 12px;
            min-height: 45px;
            margin-bottom: 10px;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .actions button {
            background: #28a745;
        }

        .spinner {
            display: none;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>

    <script>
        function copyText() {
            const text = document.getElementById("outputText").innerText;
            navigator.clipboard.writeText(text);
            alert("Copied!");
        }

        function showLoading() {
            document.getElementById("spinner").style.display = "block";
        }
    </script>

</head>

<body>

<div class="container">
    <h2>🌍 AI Language Translator</h2>

    <form method="POST" onsubmit="showLoading()">

        <textarea name="text" placeholder="Type here..." required>{{ original_text }}</textarea>

        <select name="language">
            <option value="hi" {% if selected_lang == "hi" %}selected{% endif %}>Hindi</option>
            <option value="fr" {% if selected_lang == "fr" %}selected{% endif %}>French</option>
            <option value="es" {% if selected_lang == "es" %}selected{% endif %}>Spanish</option>
            <option value="de" {% if selected_lang == "de" %}selected{% endif %}>German</option>
            <option value="ja" {% if selected_lang == "ja" %}selected{% endif %}>Japanese</option>
        </select>

        <button type="submit">Translate</button>
    </form>

    <!-- LOADING -->
    <div id="spinner" class="spinner">
        ⏳ Translating...
    </div>

    <h3>Result:</h3>

    <div class="output" id="outputText">
        {{ translated_text }}
    </div>

    <div class="actions">
        <button onclick="copyText()">Copy</button>
    </div>
</div>

</body>
</html>
